name: med_simple_parent_switch
title: Simple stock OpenThread MED parent-switch benchmark
description: >
  Simple stock OTNS parent-switching benchmark for a mobile Minimal End
  Device. The scenario uses three routers, one mobile end device, straight-line
  movement, delayed Router B/Router C activation, static 0 dBm transmit power,
  and no intentional dead zone. The mobile starts before Router A, moves beyond
  Router C at a target 5 m/s, then dwells at the end to expose late parent
  switching.

device_profile: minimal_end_device
expected_initial_parent: router_a

coordinate_system:
  meter_per_unit: 0.1
  source: "OTNS MeterPerUnit radio parameter default"

observability:
  packet_probe_reliable: true
  primary_parent_observation: packet_probe

radio_model:
  preferred: MutualInterference
  fallbacks:
    - MIDisc
    - Ideal_Rssi
    - Ideal

timing:
  settle_seconds: 120
  step_seconds: 1
  movement_steps: 30

activation:
  initial_nodes:
    - router_a
    - mobile
  delayed_node_groups:
    - delay_seconds: 300
      nodes:
        - router_b
        - router_c
  post_activation_settle_seconds: 180

nodes:
  router_a:
    type: router
    x: 350
    y: 300
    tx_power_dbm: 0
  router_b:
    type: router
    x: 750
    y: 300
    tx_power_dbm: 0
  router_c:
    type: router
    x: 1150
    y: 300
    tx_power_dbm: 0
  mobile:
    type: med
    x: 0
    y: 360
    tx_power_dbm: 0

movement:
  node: mobile
  start:
    x: 0
    y: 360
  end:
    x: 1500
    y: 360
  speed_mps: 5
  hold_end_steps: 320
