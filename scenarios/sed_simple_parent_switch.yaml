name: sed_simple_parent_switch
title: Simple stock OpenThread SED parent-switch benchmark
description: >
  Simple stock OTNS parent-switching benchmark for a mobile Sleepy End Device.
  The scenario uses two routers, one mobile end device, straight-line
  movement, delayed Router B activation, overlapping intended coverage, and no
  intentional dead zone. The mobile starts before Router A, moves beyond Router
  B at a target 5 m/s, then dwells at the end to expose late parent switching.
  Parent-command output is the primary attachment observation path because
  ping-based packet probing is not reliable for regular SEDs.

device_profile: sleepy_end_device
expected_initial_parent: router_a

coordinate_system:
  meter_per_unit: 0.1
  source: "OTNS MeterPerUnit radio parameter default"

observability:
  packet_probe_reliable: false
  primary_parent_observation: parent_command
  notes:
    - Regular SEDs typically do not respond to ping probes in OTNS.
    - Parent attachment is inferred from the OT CLI parent command and child state.
    - MLE and IP counters are collected, but packet loss alone is not treated as disconnection.

radio_model:
  preferred: MutualInterference
  fallbacks:
    - MIDisc
    - Ideal_Rssi
    - Ideal

timing:
  settle_seconds: 120
  step_seconds: 1
  movement_steps: 15

activation:
  initial_nodes:
    - router_a
    - mobile
  delayed_node_groups:
    - delay_seconds: 300
      nodes:
        - router_b
  post_activation_settle_seconds: 180

nodes:
  router_a:
    type: router
    x: 250
    y: 300
  router_b:
    type: router
    x: 800
    y: 300
  mobile:
    type: sed
    x: 150
    y: 360

movement:
  node: mobile
  start:
    x: 150
    y: 360
  end:
    x: 900
    y: 360
  speed_mps: 5
  hold_end_steps: 320
