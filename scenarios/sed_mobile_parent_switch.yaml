name: sed_mobile_parent_switch
title: Stock OpenThread SED mobility benchmark
description: >
  Stock OTNS parent-switching benchmark variant for a mobile Sleepy End Device.
  The scenario mirrors the calibrated delayed-router setup, but uses a SED and
  treats parent-command output as the primary attachment observation path because
  ping-based packet probing is not reliable for regular SEDs.

device_profile: sleepy_end_device
expected_initial_parent: router_a

observability:
  packet_probe_reliable: false
  primary_parent_observation: parent_command
  notes:
    - Regular SEDs typically do not respond to ping probes in OTNS.
    - Parent attachment is inferred from the OT CLI parent command and child state.
    - MLE and IP counters are collected, but packet loss alone is not treated as disconnection.

radio_model:
  preferred: MutualInterference
  fallbacks:
    - MIDisc
    - Ideal_Rssi
    - Ideal

timing:
  settle_seconds: 120
  step_seconds: 30
  movement_steps: 36

activation:
  initial_nodes:
    - router_a
    - mobile
  delayed_node_groups:
    - delay_seconds: 360
      nodes:
        - router_b
  post_activation_settle_seconds: 240

nodes:
  router_a:
    type: router
    x: 100
    y: 300
  router_b:
    type: router
    x: 980
    y: 300
  mobile:
    type: sed
    x: 100
    y: 300

movement:
  node: mobile
  start:
    x: 100
    y: 300
  end:
    x: 980
    y: 300

traffic_probes:
  - name: router_a_to_mobile
    kind: ping
    src: router_a
    dst: mobile
    count: 1
  - name: router_b_to_mobile
    kind: ping
    src: router_b
    dst: mobile
    count: 1
