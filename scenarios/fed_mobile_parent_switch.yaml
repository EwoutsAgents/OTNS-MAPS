name: fed_mobile_parent_switch
title: Stock OpenThread FED mobility benchmark
description: >
  Stock OTNS parent-switching benchmark variant for a mobile Full End Device.
  The scenario mirrors the calibrated delayed-router MED setup, but uses a FED
  so the mobile child is built from OTNS's FTD executable path.

device_profile: full_end_device
expected_initial_parent: router_a

observability:
  packet_probe_reliable: true
  primary_parent_observation: packet_probe
  notes:
    - FEDs are full Thread devices, but this scenario keeps the mobile node as an end device by using OTNS add fed.
    - OTNS maps fed and router nodes to the same FTD executable family.

radio_model:
  preferred: MutualInterference
  fallbacks:
    - MIDisc
    - Ideal_Rssi
    - Ideal

timing:
  settle_seconds: 120
  step_seconds: 20
  movement_steps: 40

activation:
  initial_nodes:
    - router_a
    - mobile
  delayed_node_groups:
    - delay_seconds: 300
      nodes:
        - router_b
  post_activation_settle_seconds: 180

nodes:
  router_a:
    type: router
    x: 100
    y: 300
  router_b:
    type: router
    x: 900
    y: 300
  mobile:
    type: fed
    x: 100
    y: 380

movement:
  node: mobile
  start:
    x: 100
    y: 380
  end:
    x: 900
    y: 380
  hold_end_steps: 8

traffic_probes:
  - name: router_a_to_mobile
    kind: ping
    src: router_a
    dst: mobile
    count: 1
  - name: router_b_to_mobile
    kind: ping
    src: router_b
    dst: mobile
    count: 1
